name: examples

on:
  push:
    branches: [main]
    paths: ["examples/**"]
  schedule:
    - cron: "17 6 * * 1" # weekly — catches rot from npm releases with no repo push
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: [indexer-from-zero, sales-index, sbtc-l1-proof]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install
        working-directory: examples/${{ matrix.example }}
      - run: bun run typecheck
        working-directory: examples/${{ matrix.example }}
