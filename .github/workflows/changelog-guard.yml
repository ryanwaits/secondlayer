name: Changelog Guard

# Fails if any package.json version drifts from its CHANGELOG.md top entry —
# the signal that `changeset version` bumped a version without writing a
# changelog entry (e.g. `.changeset/config.json` `changelog` disabled).

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changelog-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun run scripts/ci/check-changelogs.ts
