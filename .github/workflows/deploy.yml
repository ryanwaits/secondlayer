name: Deploy

# Required secrets:
#   DEPLOY_HOST      — Hetzner server IP
#   DEPLOY_SSH_KEY   — SSH private key (ed25519)
#   SLACK_WEBHOOK_URL — Slack incoming webhook for deploy notifications
#
# One-time setup:
#   1. ssh-keygen -t ed25519 -f deploy_key -C "github-deploy"
#   2. ssh-copy-id -i deploy_key.pub root@<server-ip>
#   3. Add secrets in GitHub repo → Settings → Secrets

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "docker/docs/**"
      - "packages/clarity-docs/**"
      - "packages/*/README.md"
      - "packages/*/CHANGELOG.md"
      - "tools/ops/*/README.md"
      - "tools/ops/*/CHANGELOG.md"
      - "plans/**"
      - "skills/**"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ vars.DEPLOY_IMAGE_OWNER || github.repository_owner }}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Catches unbound-variable regressions like deploy incident #30.
      - name: Lint docker scripts under nounset
        run: |
          for script in docker/scripts/*.sh; do
            bash -nu "$script"
          done
      - name: Lint CI scripts under nounset
        run: |
          for script in scripts/ci/*.sh; do
            bash -nu "$script"
          done
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run typecheck

  build-images:
    needs: typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - api
          - indexer
          - worker
          - agent
          - provisioner
    steps:
      - uses: actions/checkout@v4
      - name: Compute API source digest
        id: api-source
        shell: bash
        run: |
          set -euo pipefail
          digest="$(
            git ls-tree -r HEAD -- \
              package.json \
              bun.lock \
              tsconfig.json \
              docker/Dockerfile \
              packages/stacks \
              packages/shared \
              packages/subgraphs \
              packages/bundler \
              packages/api \
              | git hash-object --stdin
          )"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/secondlayer-${{ matrix.service }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SECONDLAYER_API_SOURCE_DIGEST=${{ steps.api-source.outputs.digest }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  deploy:
    needs: [typecheck, build-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        env:
          DEPLOY_UNIT: secondlayer-deploy-${{ github.run_id }}-${{ github.run_attempt }}
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_IMAGE_OWNER: ${{ env.IMAGE_OWNER }}
          DEPLOY_IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_path: scripts/ci/remote-deploy-systemd.sh
          envs: DEPLOY_UNIT,DEPLOY_SHA,DEPLOY_IMAGE_OWNER,DEPLOY_IMAGE_TAG
          # Wrapper polls systemd for 45m. Keep SSH observation slightly longer.
          command_timeout: 50m

  post-deploy-smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run post-deploy smoke checks
        env:
          SECOND_LAYER_API_URL: ${{ vars.SECOND_LAYER_API_URL || 'https://api.secondlayer.tools' }}
          STREAMS_SMOKE_KEY: ${{ secrets.STREAMS_SMOKE_KEY || 'sk-sl_streams_build_test' }}
          STREAMS_STATUS_SMOKE_KEY: ${{ secrets.STREAMS_STATUS_SMOKE_KEY || 'sk-sl_streams_status_public' }}
          STREAMS_WRONG_SCOPE_SMOKE_KEY: ${{ secrets.STREAMS_WRONG_SCOPE_SMOKE_KEY || 'sk-sl_streams_wrong_scope_test' }}
          INDEX_SMOKE_KEY: ${{ secrets.INDEX_SMOKE_KEY || 'sk-sl_index_build_test' }}
          INDEX_FREE_SMOKE_KEY: ${{ secrets.INDEX_FREE_SMOKE_KEY || 'sk-sl_index_free_test' }}
          INDEX_WRONG_SCOPE_SMOKE_KEY: ${{ secrets.INDEX_WRONG_SCOPE_SMOKE_KEY || 'sk-sl_index_wrong_scope_test' }}
        run: bash scripts/ci/post-deploy-smoke.sh

  notify:
    needs: [typecheck, deploy, post-deploy-smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ needs.deploy.result == 'success' && needs.post-deploy-smoke.result == 'success' && '✅' || '❌' }} Deploy ${{ needs.deploy.result }}, smoke ${{ needs.post-deploy-smoke.result }}: ${{ github.event.head_commit.message }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ needs.deploy.result == 'success' && needs.post-deploy-smoke.result == 'success' && ':white_check_mark:' || ':x:' }} *Deploy ${{ needs.deploy.result }} · Smoke ${{ needs.post-deploy-smoke.result }}*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run> · `${{ github.sha }}`\n${{ github.event.head_commit.message }}"
                  }
                }
              ]
            }
