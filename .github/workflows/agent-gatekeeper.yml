name: Agent Gatekeeper

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  voice-naming-lint:
    name: Voice and naming lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check changed files
        shell: bash
        run: |
          set -euo pipefail

          base="${{ github.event.before }}"
          head="${{ github.sha }}"
          if [[ "$base" =~ ^0+$ ]]; then
            base="$(git rev-list --max-parents=0 "$head")"
          fi

          term_a="$(printf 's%s' 'crape')"
          term_b="$(printf 'c%s' 'rawl')"
          term_c="$(printf 'v%s' 's Hiro')"
          term_d="$(printf 'Streaming%s' ' API')"
          term_e="$(printf 'Stream%s' ' API')"
          pattern="${term_a}|${term_b}|${term_c}|${term_d}|${term_e}"

          failed=0
          while IFS= read -r file; do
            [[ -f "$file" ]] || continue
            case "$file" in
              docs/references/*) continue ;;
              .agents/*|docs/*|README*|*/README*|*.ts|*.tsx|*.js|*.jsx|*.sh|*.yml|*.yaml) ;;
              *) continue ;;
            esac
            if grep -Eni "$pattern" -- "$file"; then
              echo "Use approved Second Layer voice and product names in $file."
              failed=1
            fi
          done < <(git diff --name-only "$base" "$head")

          exit "$failed"

  bash-lint-presence:
    name: Confirm deploy bash lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Confirm H1 remains wired
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'bash -nu' .github/workflows/deploy.yml

  commit-message-hygiene:
    name: Commit message hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check commit messages
        shell: bash
        run: |
          set -euo pipefail

          base="${{ github.event.before }}"
          head="${{ github.sha }}"
          if [[ "$base" =~ ^0+$ ]]; then
            base="$(git rev-list --max-parents=0 "$head")"
          fi

          pattern='ADR-[0-9]{4}|(^|[[:space:]])(sprint|phase)([[:space:]]|:|$)'
          failed=0

          while IFS= read -r commit; do
            subject="$(git log -1 --format=%s "$commit")"
            if grep -Eiq "$pattern" <<<"$subject"; then
              echo "$commit uses internal planning or decision tokens in the commit subject."
              echo "Use a code-specific commit message."
              failed=1
            fi
          done < <(git rev-list --reverse "$base..$head")

          exit "$failed"

  decision-log-presence:
    name: Decision log presence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Confirm decision log for architectural changes
        shell: bash
        run: |
          set -euo pipefail

          base="${{ github.event.before }}"
          head="${{ github.sha }}"
          if [[ "$base" =~ ^0+$ ]]; then
            base="$(git rev-list --max-parents=0 "$head")"
          fi

          arch_pattern='(^|/)(migrations|schema|routes)/|packages/shared/src/db/types\.ts|packages/api/src/(routes|index|streams)/|packages/indexer/src/l2/|packages/indexer/src/reorg\.ts'

          if git diff --name-only "$base" "$head" | grep -Eq "$arch_pattern"; then
            if [[ ! -s .agents/DECISIONS.md ]]; then
              echo "Architectural changes require .agents/DECISIONS.md as the decision source of truth."
              exit 1
            fi
          fi

          echo "Decision log present."

  smoke-hook:
    name: Smoke wiring check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Confirm H3 remains wired
        shell: bash
        run: |
          set -euo pipefail
          test -f scripts/ci/post-deploy-smoke.sh
          grep -q 'post-deploy-smoke' .github/workflows/deploy.yml
