name: Debug Prod

# Manual SSH-via-Actions for diagnostics. Run when local SSH path is broken.
# Read-only: prints `docker ps`, container logs, and a few psql checks. No
# mutations. Output lives in the run logs — fetch via `gh run view <id> --log`.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to inspect"
        required: true
        type: choice
        options:
          - subgraph-processor
          - all-containers
          - service-heartbeats
          - subgraphs-state
          - schema
          - full
        default: subgraph-processor

jobs:
  ssh-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SSH and inspect
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        env:
          DEBUG_TARGET: ${{ inputs.target }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEBUG_TARGET
          command_timeout: 5m
          script_path: scripts/ci/debug-prod.sh
