name: OSS Images

# Publish OSS Docker images to GitHub Container Registry.
# - Every push to `main` publishes `:latest` + the short SHA.
# - Git tags matching `v*` publish `:<tag>` (e.g. v1.0.0).
# Images: ghcr.io/<owner>/secondlayer-{api,indexer}

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ vars.DEPLOY_IMAGE_OWNER || github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service: [api, indexer, worker, agent, provisioner]

    steps:
      - uses: actions/checkout@v4
      - name: Compute API source digest
        id: api-source
        shell: bash
        run: |
          set -euo pipefail
          digest="$(
            git ls-tree -r HEAD -- \
              package.json \
              bun.lock \
              tsconfig.json \
              docker/Dockerfile \
              packages/stacks \
              packages/shared \
              packages/subgraphs \
              packages/bundler \
              packages/api \
              | git hash-object --stdin
          )"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/secondlayer-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.sha }}
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SECONDLAYER_API_SOURCE_DIGEST=${{ steps.api-source.outputs.digest }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
