name: Staging Health

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: staging-health
  cancel-in-progress: false

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # continue-on-error + retry: transient GitHub API 503s during setup must not page as staging failures
      - uses: oven-sh/setup-bun@v2
        id: setup-bun
        continue-on-error: true
        with:
          bun-version: "1.3.10"
      - uses: oven-sh/setup-bun@v2
        if: steps.setup-bun.outcome == 'failure'
        with:
          bun-version: "1.3.10"
      - name: Check staging health
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL || vars.SECOND_LAYER_API_URL || 'https://api.secondlayer.tools' }}
          STAGING_STATUS_API_KEY: ${{ secrets.STAGING_STATUS_API_KEY }}
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: bun scripts/ci/staging-health.ts
