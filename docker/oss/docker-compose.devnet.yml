# Override for local Clarinet devnet development (contributors running from this
# repo). Layer it onto the base OSS stack:
#
#   docker compose -f docker-compose.yml -f docker-compose.devnet.yml up -d \
#     postgres migrate api indexer subgraph-processor
#
# Then run `clarinet devnet start` in your clarinet project, whose
# settings/Devnet.toml must forward events to the indexer:
#   stacks_node_events_observers = ["host.docker.internal:3700"]
# (`sl devnet connect` writes that line for you.)
#
# End users without a repo checkout should use `sl devnet connect`, which writes
# an equivalent compose pinned to the published OSS images instead of building.
#
# On Linux, the devnet node can't reach an indexer bound to 127.0.0.1 via
# host.docker.internal — export INDEXER_PORT=0.0.0.0:3700 before `up`. On
# macOS (Docker Desktop / OrbStack) the default 127.0.0.1 binding works.

services:
  indexer:
    environment:
      # Keep every network key aligned: the indexer writes index_progress under
      # STACKS_NETWORK, the subgraph processor reads it under NETWORK. If they
      # differ, catch-up finds no progress row and subgraphs never advance.
      NETWORKS: testnet
      STACKS_NETWORK: testnet
      NETWORK: testnet
      # Fed by the devnet node's event observer — never reach out to Hiro mainnet.
      AUTO_BACKFILL_ENABLED: "false"
      TIP_FOLLOWER_ENABLED: "false"

  # Shared secrets key so the emitter can decrypt secrets the api encrypted
  # (e.g. subscription signing secrets). OSS auto-generates a per-process key
  # when unset — that splits api and processor. Local-dev fixed value.
  api:
    environment:
      SECONDLAYER_SECRETS_KEY: "deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef"

  subgraph-processor:
    environment:
      NETWORK: testnet
      STACKS_NETWORK: testnet
      # Allow subscription webhooks to reach a localhost receiver during local
      # dev (the emitter blocks private/loopback egress by default).
      SECONDLAYER_ALLOW_PRIVATE_EGRESS: "true"
      SECONDLAYER_SECRETS_KEY: "deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef"
