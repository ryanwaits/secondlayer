# Secondlayer OSS — full self-hosted stack.
#
#   docker compose up -d postgres migrate api indexer decoder subgraph-processor subscription-processor
#   # decoder populates decoded_events (the semantic plane that powers
#   # /v1/index and chain print_event/transfer subscriptions); subscription-processor
#   # is the webhook delivery plane. Omit both for raw-events-only indexing.
#   # then, once you're ready to run a full Stacks node (takes 1-3 days to sync):
#   docker compose up -d bitcoind
#   # wait until `bitcoin-cli getblockcount` > 666050, then:
#   docker compose up -d stacks-node
#
# Hardware: 128GB+ RAM, 2TB+ NVMe. No "light" mode — Hiro API backfill is too
# slow to index Stacks usefully. If you don't want to run the chain yourself,
# use the hosted tier at secondlayer.tools.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-secondlayer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secondlayer}
      POSTGRES_DB: ${POSTGRES_DB:-secondlayer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-127.0.0.1:5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secondlayer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: api
    command: ["bun", "run", "packages/shared/src/db/migrate.ts"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: api
    environment:
      INSTANCE_MODE: oss
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
      PORT: 3800
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      DATA_DIR: /data
      # Optional: uncomment to require a Bearer key on every request.
      # When unset, the API is open to localhost (bind POSTGRES_PORT/API_PORT
      # to 127.0.0.1 if running on a public host).
      # API_KEY: ${API_KEY:-}
    ports:
      - "${API_PORT:-3800}:3800"
    volumes:
      - subgraphs_data:/data/subgraphs
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3800/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  indexer:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: indexer
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
      PORT: 3700
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      NETWORKS: ${NETWORKS:-mainnet}
    ports:
      - "${INDEXER_PORT:-127.0.0.1:3700}:3700"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3700/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # Decoder service — reads raw events from the bundled api's internal Streams
  # endpoint and writes the semantic `decoded_events` table (ft/nft/stx
  # transfers, mints, burns, and contract PRINTS). This is what powers
  # /v1/index/events and chain `print_event`/transfer subscriptions; without it
  # decoded_events stays empty and chain subscriptions never match. Consumes
  # live from postgres via the api (no R2/bulk-publisher needed).
  decoder:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: decoder
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
      PORT: 3710
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      STACKS_NETWORK: ${STACKS_NETWORK:-mainnet}
      STREAMS_API_URL: http://api:3800
      # Internal Streams auth. Left blank → both api and decoder fall back to the
      # same built-in default key, so they agree with zero config. Override on
      # BOTH if you want a custom key.
      STREAMS_INTERNAL_API_KEY: ${STREAMS_INTERNAL_API_KEY:-}
      SBTC_DECODER_ENABLED: ${SBTC_DECODER_ENABLED:-true}
      POX4_DECODER_ENABLED: ${POX4_DECODER_ENABLED:-true}
      BNS_DECODER_ENABLED: ${BNS_DECODER_ENABLED:-false}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3710/health"]
      interval: 30s
      # /health queries per-decoder checkpoints; under heavy backfill DB load it
      # can take several seconds, so keep this generous to avoid false unhealthy.
      timeout: 15s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  subgraph-processor:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: api
    command: ["bun", "run", "packages/subgraphs/src/service.ts"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      DATA_DIR: /data
    volumes:
      - subgraphs_data:/data/subgraphs
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: unless-stopped

  # Subscription delivery plane — the chain-trigger evaluator + webhook emitter.
  # The evaluator matches chain subscriptions (print_event, *_transfer) against
  # decoded_events (populated by decoder) and enqueues signed webhook
  # deliveries. SUBGRAPH_SOURCE=streams-index is what starts the evaluator;
  # without this service no chain subscription ever fires.
  subscription-processor:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: subscription-processor
    command: ["bun", "run", "packages/subgraphs/src/subscription-service.ts"]
    environment:
      INSTANCE_MODE: oss
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      DATA_DIR: /data
      # Starts the chain-trigger evaluator against the bundled api's index plane.
      SUBGRAPH_SOURCE: ${SUBGRAPH_SOURCE:-streams-index}
      SUBGRAPH_INDEX_API_URL: http://api:3800
      STREAMS_INTERNAL_API_KEY: ${STREAMS_INTERNAL_API_KEY:-}
      # Per-subscription secrets (signing secret + any auth_config bearer tokens)
      # are encrypted at rest. The api ENCRYPTS them on create; this service
      # DECRYPTS them to deliver — so both MUST share the same key. OSS
      # auto-bootstrap writes a *different* key per container, so set this
      # explicitly in .env to run subscriptions across both services.
      SECONDLAYER_SECRETS_KEY: ${SECONDLAYER_SECRETS_KEY:-}
      # ed25519 key for the x-secondlayer-signature on every delivery. The boot
      # guard refuses to start in prod without it — set a key, or set
      # ALLOW_UNSIGNED_WEBHOOKS=true to ship unsigned (per-subscription HMAC still
      # applies). Defaulted on here so `docker compose up` boots out of the box.
      STREAMS_SIGNING_PRIVATE_KEY: ${STREAMS_SIGNING_PRIVATE_KEY:-}
      SECONDLAYER_WEBHOOK_SIGNING_PRIVATE_KEY: ${SECONDLAYER_WEBHOOK_SIGNING_PRIVATE_KEY:-}
      ALLOW_UNSIGNED_WEBHOOKS: ${ALLOW_UNSIGNED_WEBHOOKS:-true}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: unless-stopped

  bitcoind:
    image: kylemanna/bitcoind:latest
    volumes:
      - ${BITCOIN_DATA_DIR:-./data/bitcoin}:/bitcoin/.bitcoin
    ports:
      - "127.0.0.1:8332:8332"
      - "8333:8333"
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -rpcuser=${BITCOIN_RPC_USER:-stacks} -rpcpassword=${BITCOIN_RPC_PASSWORD:-changeme} getblockchaininfo | grep -q '\"blocks\"' && [ $$(bitcoin-cli -rpcuser=${BITCOIN_RPC_USER:-stacks} -rpcpassword=${BITCOIN_RPC_PASSWORD:-changeme} getblockcount) -gt 666050 ]"]
      interval: 60s
      timeout: 15s
      start_period: 120s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32G
    profiles: ["node"]

  stacks-node:
    image: ghcr.io/stacks-network/stacks-core:3.4.0.0.3
    volumes:
      - ${STACKS_DATA_DIR:-./data/stacks}:/stacks-blockchain/data
      - ./Config.toml:/stacks-blockchain/Config.toml:ro
    ports:
      - "20443:20443"
      - "20444:20444"
    depends_on:
      bitcoind:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64G
    restart: unless-stopped
    command: ["stacks-node", "start", "--config", "/stacks-blockchain/Config.toml"]
    profiles: ["node"]

volumes:
  postgres_data:
  subgraphs_data:
