# Secondlayer OSS — full self-hosted stack.
#
#   docker compose up -d postgres migrate api indexer subgraph-processor
#   # then, once you're ready to run a full Stacks node (takes 1-3 days to sync):
#   docker compose up -d bitcoind
#   # wait until `bitcoin-cli getblockcount` > 666050, then:
#   docker compose up -d stacks-node
#
# Hardware: 128GB+ RAM, 2TB+ NVMe. No "light" mode — Hiro API backfill is too
# slow to index Stacks usefully. If you don't want to run the chain yourself,
# use the hosted tier at secondlayer.tools.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-secondlayer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secondlayer}
      POSTGRES_DB: ${POSTGRES_DB:-secondlayer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-127.0.0.1:5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secondlayer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: api
    command: ["bun", "run", "packages/shared/src/db/migrate.ts"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: api
    environment:
      INSTANCE_MODE: oss
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
      PORT: 3800
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      DATA_DIR: /data
      # Optional: uncomment to require a Bearer key on every request.
      # When unset, the API is open to localhost (bind POSTGRES_PORT/API_PORT
      # to 127.0.0.1 if running on a public host).
      # API_KEY: ${API_KEY:-}
    ports:
      - "${API_PORT:-3800}:3800"
    volumes:
      - subgraphs_data:/data/subgraphs
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3800/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  indexer:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: indexer
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
      PORT: 3700
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      NETWORKS: ${NETWORKS:-mainnet}
    ports:
      - "${INDEXER_PORT:-127.0.0.1:3700}:3700"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3700/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  subgraph-processor:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: api
    command: ["bun", "run", "packages/subgraphs/src/service.ts"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      DATA_DIR: /data
    volumes:
      - subgraphs_data:/data/subgraphs
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: unless-stopped

  bitcoind:
    image: kylemanna/bitcoind:latest
    volumes:
      - ${BITCOIN_DATA_DIR:-./data/bitcoin}:/bitcoin/.bitcoin
    ports:
      - "127.0.0.1:8332:8332"
      - "8333:8333"
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -rpcuser=${BITCOIN_RPC_USER:-stacks} -rpcpassword=${BITCOIN_RPC_PASSWORD:-changeme} getblockchaininfo | grep -q '\"blocks\"' && [ $$(bitcoin-cli -rpcuser=${BITCOIN_RPC_USER:-stacks} -rpcpassword=${BITCOIN_RPC_PASSWORD:-changeme} getblockcount) -gt 666050 ]"]
      interval: 60s
      timeout: 15s
      start_period: 120s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32G
    profiles: ["node"]

  stacks-node:
    image: ghcr.io/stacks-network/stacks-core:3.4.0.0.0
    volumes:
      - ${STACKS_DATA_DIR:-./data/stacks}:/stacks-blockchain/data
      - ./Config.toml:/stacks-blockchain/Config.toml:ro
    ports:
      - "20443:20443"
      - "20444:20444"
    depends_on:
      bitcoind:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64G
    restart: unless-stopped
    command: ["stacks-node", "start", "--config", "/stacks-blockchain/Config.toml"]
    profiles: ["node"]

volumes:
  postgres_data:
  subgraphs_data:
