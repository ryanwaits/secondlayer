# The event dispatcher BLOCKS the node until an observer responds, and by
# default retries a failed delivery until it succeeds — so a slow/down observer
# can stall block processing. That is dangerous when a signer is co-located on
# the same node (the signer rides the same event-observer path), where a stuck
# indexer would starve it of block_proposal events. Ship safe-by-default:
# disable_retries skips a failed delivery instead of retry-blocking, and a low
# timeout_ms bounds the per-event wait. A missed block is fine — the indexer
# tip-follower re-fills small gaps.
[[events_observer]]
endpoint = "indexer:3700"
events_keys = ["*"]
timeout_ms = 500
disable_retries = true

