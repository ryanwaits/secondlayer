# Dedicated-hosting production compose override.
#
# Additive on top of the existing docker-compose.yml + docker-compose.hetzner.yml:
#   - Adds Traefik reverse proxy (replaces Caddy once cutover)
#   - Adds `sl-tenants` network for tenant container routing
#   - Extends provisioner + api to participate in tenant routing
#
# Everything else (postgres, indexer, worker, subgraph-processor, agent)
# stays on the existing default compose network — unchanged, not recreated.
#
# Usage (once DNS A record is live):
#   docker compose stop caddy    # vacate port 80/443
#   COMPOSE="docker compose -f docker-compose.yml -f docker-compose.hetzner.yml -f docker-compose.dedicated.yml"
#   $COMPOSE --profile platform up -d traefik provisioner
#   # Traefik issues cert for api.secondlayer.tools on first request,
#   # and per-tenant certs as tenants are provisioned.
#
# Rollback: docker compose stop traefik && docker compose up -d caddy

services:
  # ── Reverse proxy ────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.6.13
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      # Admin dashboard — localhost only, protected by basic auth.
      - "127.0.0.1:8080:8080"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik_acme:/acme
      # Read-only docker socket for dynamic provider — Traefik reads
      # container labels to build routes for tenants as they come online.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      TRAEFIK_ACME_EMAIL: ${TRAEFIK_ACME_EMAIL}
    networks:
      # `default` = the compose project default (where platform api lives).
      # `sl-tenants` = where provisioner puts tenant containers. Traefik
      # spans both so one proxy can serve api.secondlayer.tools AND
      # {slug}.secondlayer.tools.
      - default
      - sl-tenants
    labels:
      traefik.enable: "true"
      # Admin dashboard route — protected by basic auth via env-injected
      # htpasswd string. Generate: htpasswd -nb admin <password>
      # Store the output verbatim in .env as TRAEFIK_DASHBOARD_USERS.
      traefik.http.routers.traefik-admin.rule: "Host(`traefik.secondlayer.tools`)"
      traefik.http.routers.traefik-admin.entrypoints: "websecure"
      traefik.http.routers.traefik-admin.tls.certresolver: "letsencrypt"
      traefik.http.routers.traefik-admin.service: "api@internal"
      traefik.http.routers.traefik-admin.middlewares: "traefik-auth"
      traefik.http.middlewares.traefik-auth.basicauth.users: "${TRAEFIK_DASHBOARD_USERS:-}"

  # ── Platform API — adds Traefik labels, stays on default network ────
  # No `networks:` override — api keeps its existing network membership,
  # Traefik reaches it via the default network. This avoids a full
  # recreate + PG-connection blip on Traefik activation.
  api:
    labels:
      traefik.enable: "true"
      traefik.http.routers.platform-api.rule: "Host(`api.secondlayer.tools`)"
      traefik.http.routers.platform-api.entrypoints: "websecure"
      traefik.http.routers.platform-api.tls.certresolver: "letsencrypt"
      traefik.http.services.platform-api.loadbalancer.server.port: "3800"

  # ── Provisioner: spans default + sl-tenants ──────────────────────────
  # Needs default to reach the source postgres for the readonly-role
  # bootstrap. Needs sl-tenants to manage tenant containers.
  provisioner:
    networks:
      - default
      - sl-tenants

networks:
  # Reference the compose project's default network so services on it
  # can be explicitly targeted. Compose auto-creates this if no services
  # declare networks.
  default:
  # Tenant container network — provisioner creates + joins tenants to it.
  # Declared here with an explicit name so it doesn't get a project-name
  # prefix (we want `sl-tenants`, not `docker_sl-tenants`).
  sl-tenants:
    name: sl-tenants
    driver: bridge

volumes:
  traefik_acme:
