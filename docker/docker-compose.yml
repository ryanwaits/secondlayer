services:
  # PostgreSQL database
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-secondlayer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secondlayer}
      POSTGRES_DB: ${POSTGRES_DB:-secondlayer}
    volumes:
      # The chain data (100s of GB) lives here. FOOTGUN: do NOT `docker compose
      # run` a service with `depends_on: postgres` — it recreates this container
      # and can surface a wrong/empty data dir. Use `docker exec` on the running
      # container (or direct psql) for one-off DB tasks. Backstop: the indexer's
      # startup guard + /public/status `chainIntegrity` alarm on an empty volume.
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-127.0.0.1:5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secondlayer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Control-plane Postgres for the source/target split (see SCHEMA_SPLIT.md).
  # Default-on so it's part of the standard topology (an empty, idle DB until
  # cutover — single-DB deploys keep `SOURCE_/TARGET_DATABASE_URL` unset and
  # never touch it). Cutover: migrate, COPY the control-plane tables over, then
  # point TARGET_DATABASE_URL here. See docker/scripts/split-platform-db.sh.
  # NOTE: prod deploy.sh restarts only APP_SERVICES, so it never recreates this
  # container — start it once with `docker compose up -d postgres-platform`.
  postgres-platform:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-secondlayer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secondlayer}
      POSTGRES_DB: ${POSTGRES_PLATFORM_DB:-secondlayer_platform}
    volumes:
      - postgres_platform_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secondlayer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis — shared rate-limit counters so limits stay correct once the API runs
  # more than one instance. Ephemeral (no AOF/RDB): a restart resets counters,
  # which is fine for rate limiting, and the API fails OPEN if Redis is down.
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Database migrations
  migrate:
    image: ghcr.io/${DEPLOY_IMAGE_OWNER:-secondlayer-labs}/secondlayer-api:${DEPLOY_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api
    command: ["bun", "run", "packages/shared/src/db/migrate.ts"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
      # Source/target split (see docker/SCHEMA_SPLIT.md): unset → both resolve to
      # DATABASE_URL (single DB, no behavior change). Set at cutover.
      SOURCE_DATABASE_URL: ${SOURCE_DATABASE_URL:-}
      TARGET_DATABASE_URL: ${TARGET_DATABASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      postgres-platform:
        condition: service_healthy
    restart: "no"

  # API service
  api:
    image: ghcr.io/${DEPLOY_IMAGE_OWNER:-secondlayer-labs}/secondlayer-api:${DEPLOY_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api
    environment:
      INSTANCE_MODE: ${INSTANCE_MODE:-platform}
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
      # Source/target split (see docker/SCHEMA_SPLIT.md): unset → both resolve to
      # DATABASE_URL (single DB, no behavior change). Set at cutover.
      SOURCE_DATABASE_URL: ${SOURCE_DATABASE_URL:-}
      TARGET_DATABASE_URL: ${TARGET_DATABASE_URL:-}
      # Shared rate-limit store. Unset → process-local limits (single-instance
      # only). Fails open if Redis is unreachable.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PORT: 3800
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      DATA_DIR: /data
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Second Layer <noreply@secondlayer.tools>}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_LAUNCH: ${STRIPE_PRICE_LAUNCH:-}
      STRIPE_PRICE_LAUNCH_YEARLY: ${STRIPE_PRICE_LAUNCH_YEARLY:-}
      STRIPE_PRICE_SCALE: ${STRIPE_PRICE_SCALE:-}
      STRIPE_PRICE_SCALE_YEARLY: ${STRIPE_PRICE_SCALE_YEARLY:-}
      STRIPE_METER_STORAGE: ${STRIPE_METER_STORAGE:-}
      STRIPE_METER_AI_EVAL: ${STRIPE_METER_AI_EVAL:-}
      STRIPE_PRICE_STORAGE_OVERAGE: ${STRIPE_PRICE_STORAGE_OVERAGE:-}
      STRIPE_PRICE_AI_EVAL_OVERAGE: ${STRIPE_PRICE_AI_EVAL_OVERAGE:-}
      SECONDLAYER_SECRETS_KEY: ${SECONDLAYER_SECRETS_KEY}
      INDEXER_URL: ${INDEXER_URL:-http://indexer:3700}
      STREAMS_INTERNAL_API_KEY: ${STREAMS_INTERNAL_API_KEY:-}
      STREAMS_SIGNING_PRIVATE_KEY: ${STREAMS_SIGNING_PRIVATE_KEY:-}
      STREAMS_BULK_PUBLIC_BASE_URL: ${STREAMS_BULK_PUBLIC_BASE_URL:-}
      DATASETS_PUBLIC_BASE_URL: ${DATASETS_PUBLIC_BASE_URL:-}
      DATASETS_IP_RATE_LIMIT: ${DATASETS_IP_RATE_LIMIT:-60}
      # L2 decoder enable flags — read by api/src/routes/status.ts
      # (via getEnabledL2DecoderNames) so /public/status reports every
      # enabled decoder, not just ft+nft. Mirror the values set on the
      # l2-decoder service.
      SBTC_DECODER_ENABLED: ${SBTC_DECODER_ENABLED:-true}
      POX4_DECODER_ENABLED: ${POX4_DECODER_ENABLED:-true}
      BNS_DECODER_ENABLED: ${BNS_DECODER_ENABLED:-false}
      # Surfaced on /health so deploy drift is detectable without docker ps.
      # Set by the Deploy workflow + persisted into .env by deploy.sh's
      # record_successful_deploy step.
      DEPLOY_IMAGE_TAG: ${DEPLOY_IMAGE_TAG:-unknown}
    ports:
      - "${API_PORT:-3800}:3800"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      postgres-platform:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3800/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # Indexer service
  indexer:
    image: ghcr.io/${DEPLOY_IMAGE_OWNER:-secondlayer-labs}/secondlayer-indexer:${DEPLOY_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: indexer
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
      # Source/target split (see docker/SCHEMA_SPLIT.md): unset → both resolve to
      # DATABASE_URL (single DB, no behavior change). Set at cutover.
      SOURCE_DATABASE_URL: ${SOURCE_DATABASE_URL:-}
      TARGET_DATABASE_URL: ${TARGET_DATABASE_URL:-}
      PORT: 3700
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      # Streams bulk dump publisher + STX transfers dataset publisher.
      # Both are gated on the *_PUBLISHER_ENABLED flags; R2 creds are
      # required when either is true.
      STREAMS_BULK_PUBLISHER_ENABLED: ${STREAMS_BULK_PUBLISHER_ENABLED:-false}
      STREAMS_BULK_PUBLISHER_INTERVAL_MS: ${STREAMS_BULK_PUBLISHER_INTERVAL_MS:-60000}
      STX_TRANSFERS_PUBLISHER_ENABLED: ${STX_TRANSFERS_PUBLISHER_ENABLED:-false}
      STX_TRANSFERS_PUBLISHER_INTERVAL_MS: ${STX_TRANSFERS_PUBLISHER_INTERVAL_MS:-60000}
      # sBTC dataset publishers (events + token-events). Single flag gates both.
      SBTC_PUBLISHER_ENABLED: ${SBTC_PUBLISHER_ENABLED:-false}
      SBTC_PUBLISHER_INTERVAL_MS: ${SBTC_PUBLISHER_INTERVAL_MS:-60000}
      # PoX-4 + BNS dataset publishers (per-family flags).
      POX4_CALLS_PUBLISHER_ENABLED: ${POX4_CALLS_PUBLISHER_ENABLED:-false}
      POX4_CALLS_PUBLISHER_INTERVAL_MS: ${POX4_CALLS_PUBLISHER_INTERVAL_MS:-60000}
      BNS_NAME_EVENTS_PUBLISHER_ENABLED: ${BNS_NAME_EVENTS_PUBLISHER_ENABLED:-false}
      BNS_NAME_EVENTS_PUBLISHER_INTERVAL_MS: ${BNS_NAME_EVENTS_PUBLISHER_INTERVAL_MS:-60000}
      BNS_NAMESPACE_EVENTS_PUBLISHER_ENABLED: ${BNS_NAMESPACE_EVENTS_PUBLISHER_ENABLED:-false}
      BNS_NAMESPACE_EVENTS_PUBLISHER_INTERVAL_MS: ${BNS_NAMESPACE_EVENTS_PUBLISHER_INTERVAL_MS:-60000}
      BNS_MARKETPLACE_EVENTS_PUBLISHER_ENABLED: ${BNS_MARKETPLACE_EVENTS_PUBLISHER_ENABLED:-false}
      BNS_MARKETPLACE_EVENTS_PUBLISHER_INTERVAL_MS: ${BNS_MARKETPLACE_EVENTS_PUBLISHER_INTERVAL_MS:-60000}
      # Contract registry worker — classifies deployed contracts vs SIP-009/010/013
      # to power trait discovery (/v1/contracts) + trait-scoped subgraph sources.
      # Defaults on; set CONTRACT_REGISTRY_ENABLED=false in the host env to disable.
      CONTRACT_REGISTRY_ENABLED: ${CONTRACT_REGISTRY_ENABLED:-true}
      CONTRACT_REGISTRY_INTERVAL_MS: ${CONTRACT_REGISTRY_INTERVAL_MS:-30000}
      STREAMS_BULK_NETWORK: ${STREAMS_BULK_NETWORK:-mainnet}
      STREAMS_BULK_PREFIX: ${STREAMS_BULK_PREFIX:-stacks-streams/mainnet/v0}
      STREAMS_BULK_RANGE_SIZE_BLOCKS: ${STREAMS_BULK_RANGE_SIZE_BLOCKS:-10000}
      STREAMS_BULK_FINALITY_LAG_BLOCKS: ${STREAMS_BULK_FINALITY_LAG_BLOCKS:-144}
      STREAMS_BULK_OUTPUT_DIR: ${STREAMS_BULK_OUTPUT_DIR:-tmp/streams-bulk}
      STREAMS_BULK_R2_ENDPOINT: ${STREAMS_BULK_R2_ENDPOINT:-}
      STREAMS_BULK_R2_ACCESS_KEY_ID: ${STREAMS_BULK_R2_ACCESS_KEY_ID:-}
      STREAMS_BULK_R2_SECRET_ACCESS_KEY: ${STREAMS_BULK_R2_SECRET_ACCESS_KEY:-}
      STREAMS_BULK_R2_BUCKET: ${STREAMS_BULK_R2_BUCKET:-}
      DATASETS_PREFIX: ${DATASETS_PREFIX:-stacks-datasets/mainnet/v0}
      DATASETS_OUTPUT_DIR: ${DATASETS_OUTPUT_DIR:-tmp/datasets}
    ports:
      - "${INDEXER_PORT:-3700}:3700"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3700/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # Continuous L2 decoder service
  l2-decoder:
    image: ghcr.io/${DEPLOY_IMAGE_OWNER:-secondlayer-labs}/secondlayer-indexer:${DEPLOY_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: indexer
    command: ["bun", "run", "packages/indexer/src/l2/service.ts"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
      # Source/target split (see docker/SCHEMA_SPLIT.md): unset → both resolve to
      # DATABASE_URL (single DB, no behavior change). Set at cutover.
      SOURCE_DATABASE_URL: ${SOURCE_DATABASE_URL:-}
      TARGET_DATABASE_URL: ${TARGET_DATABASE_URL:-}
      STREAMS_API_URL: http://api:3800
      STREAMS_INTERNAL_API_KEY: ${STREAMS_INTERNAL_API_KEY:-}
      PORT: 3710
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      STACKS_NETWORK: ${STACKS_NETWORK:-mainnet}
      SBTC_DECODER_ENABLED: ${SBTC_DECODER_ENABLED:-true}
      # PoX-4 transaction-result decoder. Mainnet-only; auto-seeds checkpoint
      # to tip on first enable (no historical replay).
      POX4_DECODER_ENABLED: ${POX4_DECODER_ENABLED:-true}
      POX4_DECODER_INTERVAL_MS: ${POX4_DECODER_INTERVAL_MS:-30000}
      POX4_DECODER_BATCH_SIZE: ${POX4_DECODER_BATCH_SIZE:-500}
      # BNS-V2 print-event decoder. Subscribes to BNS-V2 contract prints,
      # writes name/namespace/marketplace events + maintains current-state
      # projections (bns_names, bns_namespaces).
      BNS_DECODER_ENABLED: ${BNS_DECODER_ENABLED:-false}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3710/health"]
      interval: 30s
      # /health queries per-decoder checkpoints; under heavy backfill DB load it
      # can take 5-7s, so 3s produced false "unhealthy" + failed deploy gates
      # while the decoder was actually fine (#46 backfill). 15s gives headroom.
      timeout: 15s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  # Subgraph processor — shared-rip 2026-05-14 moves subgraph runtime onto
  # the platform alongside the API (previously ran inside per-tenant
  # `sl-proc` containers under the dedicated model). Same DB as api,
  # listens `indexer:new_block` NOTIFY, catches up + tails all active
  # subgraphs across accounts.
  subgraph-processor:
    image: ghcr.io/${DEPLOY_IMAGE_OWNER:-secondlayer-labs}/secondlayer-api:${DEPLOY_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api
    command: ["bun", "run", "packages/subgraphs/src/service.ts"]
    # Reuses the `api` image but runs the subgraph service, which has no HTTP
    # server — so the image's inherited `curl :3800/health` healthcheck can
    # never pass and falsely reports "unhealthy". Disable it; liveness is via
    # `restart: unless-stopped` + logs, same as the worker service.
    healthcheck:
      disable: true
    environment:
      INSTANCE_MODE: ${INSTANCE_MODE:-platform}
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
      # Source/target split (see docker/SCHEMA_SPLIT.md): unset → both resolve to
      # DATABASE_URL (single DB, no behavior change). Set at cutover.
      SOURCE_DATABASE_URL: ${SOURCE_DATABASE_URL:-}
      TARGET_DATABASE_URL: ${TARGET_DATABASE_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      DATA_DIR: /data
      SECONDLAYER_SECRETS_KEY: ${SECONDLAYER_SECRETS_KEY}
    volumes:
      - ${DATA_DIR:-/opt/secondlayer/data}/views:/data/subgraphs
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      postgres-platform:
        condition: service_healthy
    restart: unless-stopped

  # Worker service — scheduled background jobs (storage measurement + tenant
  # trial/health crons in platform mode).
  worker:
    image: ghcr.io/${DEPLOY_IMAGE_OWNER:-secondlayer-labs}/secondlayer-worker:${DEPLOY_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: worker
    environment:
      INSTANCE_MODE: ${INSTANCE_MODE:-platform}
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
      # Source/target split (see docker/SCHEMA_SPLIT.md): unset → both resolve to
      # DATABASE_URL (single DB, no behavior change). Set at cutover.
      SOURCE_DATABASE_URL: ${SOURCE_DATABASE_URL:-}
      TARGET_DATABASE_URL: ${TARGET_DATABASE_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      NETWORKS: ${NETWORKS:-mainnet}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_METER_STORAGE: ${STRIPE_METER_STORAGE:-}
      STRIPE_METER_AI_EVAL: ${STRIPE_METER_AI_EVAL:-}
      SECONDLAYER_SECRETS_KEY: ${SECONDLAYER_SECRETS_KEY}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      postgres-platform:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  postgres_platform_data:
