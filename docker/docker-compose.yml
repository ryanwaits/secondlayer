services:
  # PostgreSQL database
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-secondlayer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secondlayer}
      POSTGRES_DB: ${POSTGRES_DB:-secondlayer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-127.0.0.1:5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secondlayer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Database migrations
  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api
    command: ["bun", "run", "packages/shared/src/db/migrate.ts"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # API service
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api
    environment:
      INSTANCE_MODE: ${INSTANCE_MODE:-platform}
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
      PORT: 3800
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      DATA_DIR: /data
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Second Layer <noreply@secondlayer.tools>}
      SECONDLAYER_SECRETS_KEY: ${SECONDLAYER_SECRETS_KEY}
      PROVISIONER_URL: ${PROVISIONER_URL:-http://provisioner:3850}
      PROVISIONER_SECRET: ${PROVISIONER_SECRET:-}
    ports:
      - "${API_PORT:-3800}:3800"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3800/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # Indexer service
  indexer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: indexer
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
      PORT: 3700
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    ports:
      - "${INDEXER_PORT:-3700}:3700"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3700/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # Worker service — scheduled background jobs (storage measurement + tenant
  # trial/health crons in platform mode).
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: worker
    environment:
      INSTANCE_MODE: ${INSTANCE_MODE:-platform}
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      NETWORKS: ${NETWORKS:-mainnet}
      PROVISIONER_URL: ${PROVISIONER_URL:-http://provisioner:3850}
      PROVISIONER_SECRET: ${PROVISIONER_SECRET:-}
      SECONDLAYER_SECRETS_KEY: ${SECONDLAYER_SECRETS_KEY}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Provisioner service — tenant Docker lifecycle (platform mode only).
  # Activated via `--profile platform`. OSS users never run this.
  provisioner:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: provisioner
    environment:
      PROVISIONER_PORT: "3850"
      PROVISIONER_SECRET: ${PROVISIONER_SECRET:-}
      PROVISIONER_SOURCE_DB_ADMIN_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
      PROVISIONER_SOURCE_DB_READONLY_PASSWORD: ${PROVISIONER_SOURCE_DB_READONLY_PASSWORD:-}
      PROVISIONER_SOURCE_DB_HOST: ${PROVISIONER_SOURCE_DB_HOST:-postgres:5432}
      PROVISIONER_SOURCE_DB_NAME: ${POSTGRES_DB:-secondlayer}
      PROVISIONER_IMAGE_TAG: ${PROVISIONER_IMAGE_TAG:-latest}
      PROVISIONER_IMAGE_OWNER: ${PROVISIONER_IMAGE_OWNER:-secondlayer-labs}
      PROVISIONER_TENANT_BASE_DOMAIN: ${PROVISIONER_TENANT_BASE_DOMAIN:-secondlayer.tools}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    volumes:
      # Required for provisioner to create/manage tenant containers. Gives
      # root-on-host effectively — run only on hosts where that's acceptable.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["platform"]

  # Subgraph processor service
  subgraph-processor:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api
    command: ["bun", "run", "packages/subgraphs/src/service.ts"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-secondlayer}:${POSTGRES_PASSWORD:-secondlayer}@postgres:5432/${POSTGRES_DB:-secondlayer}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      DATA_DIR: /data
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: unless-stopped

volumes:
  postgres_data:
