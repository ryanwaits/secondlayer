# Node server (AX162-S) — bitcoind + stacks-node
# Runs on dedicated hardware, pushes events to app server indexer
#
# Startup order:
#   1. docker compose up -d bitcoind   (IBD begins, takes 1-3 days)
#   2. Wait until bitcoind blocks > 666050 (Stacks genesis burn height)
#   3. docker compose up -d stacks-node

services:
  bitcoind:
    image: kylemanna/bitcoind:latest
    volumes:
      - ${BITCOIN_DATA_DIR:-/data/bitcoin}:/bitcoin/.bitcoin
      # Note: bitcoin.conf must be copied into BITCOIN_DATA_DIR before starting.
      # The kylemanna/bitcoind image chowns the data dir to UID 1000 on startup,
      # so also run: chown -R 1000:1000 $BITCOIN_DATA_DIR
    ports:
      - "8333:8333"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    deploy:
      resources:
        limits:
          memory: 32G
    restart: unless-stopped
    healthcheck:
      # Passes only when bitcoind is responsive AND past Stacks genesis burn height (666050)
      test: ["CMD-SHELL", "bitcoin-cli -rpcuser=stacks -rpcpassword=${BITCOIN_RPC_PASSWORD} getblockchaininfo | grep -q '\"blocks\"' && [ $(bitcoin-cli -rpcuser=stacks -rpcpassword=${BITCOIN_RPC_PASSWORD} getblockcount) -gt 666050 ]"]
      interval: 60s
      timeout: 15s
      start_period: 120s
      retries: 3

  stacks-node:
    image: ghcr.io/stacks-network/stacks-core:3.3.0.0.6
    volumes:
      - ${STACKS_DATA_DIR:-/data/stacks}:/stacks-blockchain/data
      - ./Config.toml:/stacks-blockchain/Config.toml:ro
    ports:
      - "20443:20443"
      - "20444:20444"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      bitcoind:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64G
    restart: unless-stopped
    command: ["stacks-node", "start", "--config", "/stacks-blockchain/Config.toml"]
