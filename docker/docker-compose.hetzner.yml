# Hetzner AX52 override — extends base docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.hetzner.yml up -d
#
# Data paths (configurable via .env):
#   DATA_DIR         - base data directory (default: /opt/secondlayer/data)
#
# Note: stacks-node + bitcoind run on a separate node server.
# See docker/node-server/ for node server setup.

services:
  postgres:
    shm_size: 1gb
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_command=test -f /wal_archive/%f || cp %p /wal_archive/%f"
      - "-c"
      - "archive_timeout=300"
    volumes:
      - ${DATA_DIR:-/opt/secondlayer/data}/postgres:/var/lib/postgresql/data
      - ${DATA_DIR:-/opt/secondlayer/data}/wal_archive:/wal_archive
    # Join sl-source so tenant api/processor containers (which join sl-source
    # via the provisioner) can resolve this as `postgres:5432` for read-only
    # source-data queries + pg_notify listeners.
    networks:
      default: {}
      sl-source:
        aliases:
          - postgres

  api:
    environment:
      STACKS_NODE_RPC_URL: ${STACKS_NODE_RPC_URL:-}
      HIRO_API_URL: ${HIRO_API_URL:-}
      HIRO_API_KEY: ${HIRO_API_KEY:-}
    volumes:
      - ${DATA_DIR:-/opt/secondlayer/data}/views:/data/subgraphs
    deploy:
      resources:
        limits:
          memory: 2G

  indexer:
    environment:
      STACKS_NODE_RPC_URL: ${STACKS_NODE_RPC_URL:-http://37.27.171.220:20443}
      TIP_FOLLOWER_ENABLED: ${TIP_FOLLOWER_ENABLED:-true}
      AUTO_BACKFILL_ENABLED: ${AUTO_BACKFILL_ENABLED:-true}
      BACKFILL_INCLUDE_RAW_TX: ${BACKFILL_INCLUDE_RAW_TX:-true}
      ARCHIVE_DIR: /data/archive
    volumes:
      - ${DATA_DIR:-/opt/secondlayer/data}/archive:/data/archive

  l2-decoder:
    deploy:
      resources:
        limits:
          memory: 512M

  provisioner:
    # Provisioner needs sl-tenants to reach `sl-pg-<slug>` for storage
    # measurement; default to reach secondlayer-postgres-1 for the readonly
    # role bootstrap. Also used to talk to the Docker daemon via the socket
    # passthrough in the base compose file.
    environment:
      STACKS_NODE_RPC_URL: ${STACKS_NODE_RPC_URL:-http://37.27.171.220:20443}
      SECONDLAYER_SECRETS_KEY: ${SECONDLAYER_SECRETS_KEY}
    networks:
      default: {}
      sl-tenants:

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN:-secondlayer.tools}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-ryan.waits@gmail.com}
    # Caddy needs default (to reach platform `api`) and sl-tenants (to reach
    # `sl-api-<slug>` containers provisioned dynamically).
    networks:
      - default
      - sl-tenants
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  bastion:
    container_name: secondlayer-bastion
    build:
      context: ./bastion
      dockerfile: Dockerfile
    # 2222:22 — public SSH entry point. Only port forwarding is permitted.
    ports:
      - "2222:22"
    # Needs sl-tenants so `sl-pg-<slug>` resolves when a tenant's SSH session
    # requests a tunnel to its pg.
    networks:
      - sl-tenants
    volumes:
      - ${DATA_DIR:-/opt/secondlayer/data}/bastion:/var/bastion-state
    restart: unless-stopped
    labels:
      secondlayer.role: bastion

  agent:
    container_name: secondlayer-agent
    image: ghcr.io/${DEPLOY_IMAGE_OWNER:-secondlayer-labs}/secondlayer-agent:${DEPLOY_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: agent
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SLACK_API_TOKEN: ${SLACK_API_TOKEN:-}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AGENT_DATA_DIR: /data/agent
      AGENT_DRY_RUN: ${AGENT_DRY_RUN:-false}
      AGENT_AI_ENABLED: ${AGENT_AI_ENABLED:-true}
      AGENT_POLL_INTERVAL_MS: ${AGENT_POLL_INTERVAL_MS:-300000}
      AGENT_BUDGET_CAP_DAILY_USD: ${AGENT_BUDGET_CAP_DAILY_USD:-5}
      COMPOSE_DIR: /opt/secondlayer/docker
      NODE_SERVER_URL: ${NODE_SERVER_URL}
    volumes:
      - ${DATA_DIR:-/opt/secondlayer/data}/agent:/data/agent
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      api:
        condition: service_healthy
      indexer:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

networks:
  # Both networks are created by the provisioner (`networkEnsure` in
  # docker.ts / names.ts). Compose references them as `external: true` so
  # compose won't try to create/adopt them (which fails with "network exists
  # but has incorrect labels"). The provisioner remains the canonical creator.
  sl-tenants:
    name: sl-tenants
    external: true
  sl-source:
    name: sl-source
    external: true
