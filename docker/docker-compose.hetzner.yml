# Hetzner AX52 override — extends base docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.hetzner.yml up -d
#
# Data paths (configurable via .env):
#   DATA_DIR         - base data directory (default: /opt/secondlayer/data)
#
# Note: stacks-node + bitcoind run on a separate node server.
# See docker/node-server/ for node server setup.

services:
  postgres:
    shm_size: 1gb
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_command=test -f /wal_archive/%f || cp %p /wal_archive/%f"
      - "-c"
      - "archive_timeout=300"
      # 100 was undersized for 7 services + N>1 api replicas (~94 steady, mostly
      # idle pooled). 200 gives headroom; applied via a deliberate `up -d postgres`
      # (deploy.sh never recreates postgres, so this must be set here to persist).
      - "-c"
      - "max_connections=200"
    volumes:
      - ${DATA_DIR:-/opt/secondlayer/data}/postgres:/var/lib/postgresql/data
      - ${DATA_DIR:-/opt/secondlayer/data}/wal_archive:/wal_archive

  # Control-plane DB for the source/target split. Persist to the host DATA_DIR
  # like the chain instance (the base compose only declares a named volume).
  # Small (control-plane is megabytes) — no WAL archiving wired yet; it rides the
  # nightly logical snapshot once cutover lands.
  postgres-platform:
    shm_size: 256mb
    volumes:
      - ${DATA_DIR:-/opt/secondlayer/data}/postgres-platform:/var/lib/postgresql/data

  # Offsite backups: ships the WAL postgres archives to /wal_archive up to R2 and
  # takes periodic base backups (point-in-time recovery). See
  # docs/runbook/db-backup-restore.md. Reuses the Streams R2 creds by default;
  # WALG_S3_PREFIX should point at a SEPARATE PRIVATE bucket from the public
  # dumps bucket. Purely additive — postgres is unchanged.
  walg-backup:
    build:
      context: ./walg
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      WALG_S3_PREFIX: ${WALG_S3_PREFIX:-s3://secondlayer-db-backups/pg}
      # R2 is S3-compatible; map the existing Streams R2 creds straight through.
      AWS_ACCESS_KEY_ID: ${WALG_R2_ACCESS_KEY_ID:-${STREAMS_BULK_R2_ACCESS_KEY_ID}}
      AWS_SECRET_ACCESS_KEY: ${WALG_R2_SECRET_ACCESS_KEY:-${STREAMS_BULK_R2_SECRET_ACCESS_KEY}}
      AWS_ENDPOINT: ${WALG_R2_ENDPOINT:-${STREAMS_BULK_R2_ENDPOINT}}
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_REGION: auto
      WALG_COMPRESSION_METHOD: zstd
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-secondlayer}
      PGPASSWORD: ${POSTGRES_PASSWORD:-secondlayer}
      PGDATABASE: ${POSTGRES_DB:-secondlayer}
      # Must equal Postgres's own data_directory — wal-g backup-push refuses if
      # the path differs from what Postgres reports. So mount at the same path.
      PGDATA: /var/lib/postgresql/data
      RETAIN_FULL: ${WALG_RETAIN_FULL:-4}
      BACKUP_INTERVAL_SECS: ${WALG_BACKUP_INTERVAL_SECS:-604800}
    volumes:
      # PGDATA read-only (backup-push reads the data dir); the WAL spool is r/w
      # so the spooler can delete segments after they're safely in R2.
      - ${DATA_DIR:-/opt/secondlayer/data}/postgres:/var/lib/postgresql/data:ro
      - ${DATA_DIR:-/opt/secondlayer/data}/wal_archive:/wal_archive

  api:
    environment:
      # The tx-inclusion proof route fetches signed block headers from the node's
      # /v3/blocks; default to the same node the indexer uses so proofs work
      # without a .env entry.
      STACKS_NODE_RPC_URL: ${STACKS_NODE_RPC_URL:-http://37.27.171.220:20443}
      # Reorg-safety margin (blocks) the public Streams tip is held back from the
      # raw tip. Matches the code default; pinned here so it's tunable without a
      # redeploy (deploys git reset --hard, so prod stays in sync). Raising it
      # trades latency for reorg safety; the decoder/consumer rewind on reorg.
      STREAMS_TIP_REORG_MARGIN_BLOCKS: "2"
    volumes:
      - ${DATA_DIR:-/opt/secondlayer/data}/views:/data/subgraphs
    deploy:
      # N>1 replicas behind Caddy → rolling, zero-502 deploys + a single
      # replica recreate never stalls the streams-index processors (they reach
      # api over round-robin Docker DNS). 2× the 2G limit = 4G api headroom.
      replicas: ${API_REPLICAS:-2}
      resources:
        limits:
          memory: 2G

  indexer:
    environment:
      STACKS_NODE_RPC_URL: ${STACKS_NODE_RPC_URL:-http://37.27.171.220:20443}
      TIP_FOLLOWER_ENABLED: ${TIP_FOLLOWER_ENABLED:-true}
      AUTO_BACKFILL_ENABLED: ${AUTO_BACKFILL_ENABLED:-true}
      BACKFILL_INCLUDE_RAW_TX: ${BACKFILL_INCLUDE_RAW_TX:-true}
      ARCHIVE_DIR: /data/archive
    volumes:
      - ${DATA_DIR:-/opt/secondlayer/data}/archive:/data/archive

  l2-decoder:
    deploy:
      resources:
        limits:
          memory: 512M

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN:-secondlayer.tools}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-ryan.waits@gmail.com}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  subgraph-processor:
    environment:
      # 8 slots; heavy (broad/non-sparse) ops budgeted to 2 by the claim query
      # so whale syncs can't hold every slot — light contract-scoped syncs flow.
      SUBGRAPH_OPERATION_CONCURRENCY: "8"
      SUBGRAPH_HEAVY_OP_BUDGET: "2"
      # Eligible subgraphs read chain data from the public microservices
      # (Streams clock + Index data) instead of the indexer Postgres. Ineligible
      # subgraphs transparently stay on the DB tap. Unset to roll back to db.
      SUBGRAPH_SOURCE: streams-index
    # streams-index routes the block source, reorg poll, and trigger evaluator
    # over HTTP to api:3800, so the processor must wait for api like l2-decoder
    # does. Merges additively with the base migrate+postgres deps.
    depends_on:
      api:
        condition: service_healthy

  subscription-processor:
    environment:
      # Gates the chain-trigger evaluator + chain-reorg poll (both read the public
      # Streams/Index plane over HTTP at api:3800). The outbox emitter runs
      # regardless. Unset to roll the chain-subscription plane back to dormant.
      SUBGRAPH_SOURCE: streams-index
    depends_on:
      api:
        condition: service_healthy
    deploy:
      # N replicas scale webhook DELIVERY (the emitter is a competing-consumer via
      # FOR UPDATE SKIP LOCKED) and add failover for the single-leader evaluator +
      # chain-reorg rewind (a standby acquires the lock within pollMs if the leader
      # dies). The evaluator itself stays single-leader, so this is throughput +
      # availability, not faster evaluation.
      replicas: ${SUBSCRIPTION_PROCESSOR_REPLICAS:-1}

volumes:
  caddy_data:
  caddy_config:
