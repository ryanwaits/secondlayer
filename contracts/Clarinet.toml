# Reference Clarity contracts for @secondlayer/stacks.
#
# NOTE: spv-adapter requires Clarity 6 / Stacks Epoch 4.0 (the SIP-044 Bitcoin
# SPV built-ins). Clarinet >= 3.21 boots simnet at Epoch 4.0, so it type-checks
# AND executes the built-ins — drive it with `clarinet console`/`@stacks/clarinet-sdk`
# (see README.md and packages/stacks `onchain.simnet.test.ts`). No node required.

[project]
name = "secondlayer-contracts"
authors = []
telemetry = false
cache_dir = "./.cache"

[contracts.spv-adapter]
path = "contracts/spv-adapter.clar"
clarity_version = 6
epoch = "4.0"
