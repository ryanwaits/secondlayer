<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>OG — Docs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;460;560&family=Sora:wght@500;600&family=Fira+Code:wght@460;560&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
	/* technical examples staggered as bg texture in the right corner */
	.docs-bg {
		position: absolute;
		transform: scale(1.15);
		transform-origin: top right;
		left: 600px;
		top: 130px;
		right: -70px;
		bottom: 44px;
		font-family: var(--mono);
		-webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 96%);
		mask-image: linear-gradient(to bottom, black 50%, transparent 96%);
	}

	.snippet {
		position: absolute;
		background: var(--paper-elevated);
		border: 1.5px solid var(--hairline);
		border-radius: 8px;
		padding: 16px 20px;
		font-size: 16px;
		line-height: 1.6;
		color: var(--text-muted);
		white-space: pre;
		overflow: hidden;
	}

	.snippet.chrome { background: var(--chrome); }
	.snippet .p { color: var(--text-dim); }
	.snippet .a { color: var(--accent); }
	.snippet .k { color: rgba(17, 17, 17, 0.42); }

	.s1 { left: 0; top: 0; width: 560px; }
	.s2 { left: 70px; top: 86px; width: 540px; }
	.s3 { left: 24px; top: 296px; width: 560px; }

	.headline { max-width: 580px; }
</style>
</head>
<body>
	<div class="plate">
		<header class="plate-top">
			<div class="brand">
				<svg viewBox="6 9 36 24" width="36" height="24" aria-hidden="true">
					<polygon points="8,23 28,15 40,23 20,31" class="logo-echo"/>
					<polygon points="8,19 28,11 40,19 20,27" class="logo-primary"/>
				</svg>
				secondlayer
			</div>
			<div class="route-label">docs</div>
		</header>

		<main class="plate-main">
			<h1 class="headline">Every feature,<br><span class="quiet">explained.</span></h1>
		</main>

		<div class="docs-bg" aria-hidden="true">
			<div class="snippet chrome s1"><span class="p">$</span> curl <span class="a">api.secondlayer.tools/v1/index/events</span></div>
			<div class="snippet s2"><span class="p">{</span>
  <span class="k">"events"</span>: <span class="p">[</span> &hellip; <span class="p">],</span>
  <span class="k">"next_cursor"</span>: "3412888:0",
  <span class="k">"tip"</span>: <span class="p">{</span> <span class="k">"block_height"</span>: 3412887 <span class="p">}</span>
<span class="p">}</span></div>
			<div class="snippet chrome s3"><span class="p">$</span> sl subgraphs deploy <span class="k">./subgraph.ts</span></div>
		</div>
	</div>
</body>
</html>
