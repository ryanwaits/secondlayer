<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>OG — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;460;560&family=Sora:wght@500;600&family=Fira+Code:wght@460;560&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
	/* chain in → decoded → your API: staggered collage in the right corner */
	.story-bg {
		position: absolute;
		transform: scale(1.15);
		transform-origin: top right;
		left: 655px;
		top: 126px;
		right: -80px;
		bottom: 44px;
		font-family: var(--mono);
		font-variant-numeric: tabular-nums;
		-webkit-mask-image: linear-gradient(to bottom, black 52%, transparent 96%);
		mask-image: linear-gradient(to bottom, black 52%, transparent 96%);
	}

	.story-card {
		position: absolute;
		background: var(--paper-elevated);
		border: 1.5px solid var(--hairline);
		border-radius: 8px;
		overflow: hidden;
		white-space: nowrap;
	}

	/* decoded event rows */
	.story-rows { left: 0; top: 0; width: 520px; font-size: 16px; }
	.story-rows .row {
		display: flex;
		gap: 28px;
		padding: 11px 18px;
		color: var(--text-muted);
	}
	.story-rows .row + .row { border-top: 1.5px solid var(--hairline); }
	.story-rows .h { width: 120px; color: rgba(17, 17, 17, 0.6); }

	/* your subgraph definition */
	.story-code {
		left: 90px;
		top: 158px;
		width: 520px;
		font-size: 16px;
		line-height: 1.6;
		padding: 14px 20px;
		white-space: pre;
		color: rgba(17, 17, 17, 0.42);
	}
	.story-code .fn { color: rgba(37, 99, 235, 0.75); }
	.story-code .str { color: rgba(17, 17, 17, 0.58); }
	.story-code .dim { color: rgba(17, 17, 17, 0.28); }

	/* your API */
	.story-ep {
		left: 30px;
		top: 372px;
		width: 540px;
		font-size: 17px;
		padding: 14px 20px;
		background: var(--chrome);
		color: var(--text-muted);
	}
	.story-ep .m { color: var(--accent); font-weight: 560; }

	.headline { max-width: 580px; }
</style>
</head>
<body>
	<div class="plate">
		<header class="plate-top">
			<div class="brand">
				<svg viewBox="6 9 36 24" width="36" height="24" aria-hidden="true">
					<polygon points="8,23 28,15 40,23 20,31" class="logo-echo"/>
					<polygon points="8,19 28,11 40,19 20,27" class="logo-primary"/>
				</svg>
				secondlayer
			</div>
		</header>

		<main class="plate-main">
			<h1 class="headline">Index the chain.<br>Own your API.</h1>
		</main>

		<div class="story-bg" aria-hidden="true">
			<div class="story-card story-rows">
				<div class="row"><span class="h">#3,412,886</span><span>ft_transfer</span><span>sbtc-token</span></div>
				<div class="row"><span class="h">#3,412,887</span><span>print_event</span><span>"sale"</span></div>
			</div>
			<div class="story-card story-code"><span class="fn">defineSubgraph</span><span class="dim">({</span>
  name: <span class="str">"stx-transfers"</span><span class="dim">,</span>
  schema: <span class="dim">{</span> transfers: <span class="dim">{</span> &hellip; <span class="dim">}</span> <span class="dim">},</span>
  handlers: <span class="dim">{</span> &hellip; <span class="dim">},</span>
<span class="dim">});</span></div>
			<div class="story-card story-ep"><span class="m">GET</span> api.secondlayer.tools/v1/subgraphs/stx-transfers</div>
		</div>
	</div>
</body>
</html>
