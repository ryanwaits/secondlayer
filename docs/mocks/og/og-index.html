<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>OG — Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;460;560&family=Sora:wght@500;600&family=Fira+Code:wght@460;560&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
	/* decoded event rows, creeping in from the right as bg texture */
	.rows-bg {
		position: absolute;
		transform: scale(1.15);
		transform-origin: top right;
		left: 690px;
		top: 150px;
		right: -80px;
		bottom: 44px;
		font-family: var(--mono);
		font-size: 18px;
		font-variant-numeric: tabular-nums;
		-webkit-mask-image: linear-gradient(to bottom, black 55%, transparent 96%);
		mask-image: linear-gradient(to bottom, black 55%, transparent 96%);
	}

	.row {
		display: flex;
		align-items: center;
		gap: 36px;
		padding: 14px 20px;
		border-bottom: 1.5px solid var(--hairline);
		color: var(--text-muted);
		white-space: nowrap;
	}

	.row:first-child { border-top: 1.5px solid var(--hairline); }
	.row .h { width: 140px; color: rgba(17, 17, 17, 0.6); }
	.row .t { width: 190px; }
	.row .d { color: var(--text-dim); }
	.row .acc { color: rgba(37, 99, 235, 0.75); }

	.headline { max-width: 520px; }
</style>
</head>
<body>
	<div class="plate">
		<header class="plate-top">
			<div class="brand">
				<svg viewBox="6 9 36 24" width="36" height="24" aria-hidden="true">
					<polygon points="8,23 28,15 40,23 20,31" class="logo-echo"/>
					<polygon points="8,19 28,11 40,19 20,27" class="logo-primary"/>
				</svg>
				secondlayer
			</div>
			<div class="route-label">index</div>
		</header>

		<main class="plate-main">
			<h1 class="headline">Roll your own<br><span class="quiet">indexer.</span></h1>
		</main>

		<div class="rows-bg" aria-hidden="true">
			<div class="row"><span class="h">#3,412,884</span><span class="t">contract_call</span><span>pox-4 <span class="d">&middot;</span> stack-stx</span></div>
			<div class="row"><span class="h">#3,412,885</span><span class="t">ft_transfer</span><span>sbtc-token</span></div>
			<div class="row"><span class="h">#3,412,886</span><span class="t">print_event</span><span><span class="acc">"sale"</span> <span class="d">&middot;</span> marketplace-v2</span></div>
			<div class="row"><span class="h">#3,412,887</span><span class="t">stx_transfer</span><span>125.5 STX</span></div>
			<div class="row"><span class="h">#3,412,887</span><span class="t">nft_transfer</span><span>bns <span class="d">&middot;</span> name-transfer</span></div>
		</div>
	</div>
</body>
</html>
